apiVersion: apps/v1
kind: Deployment
metadata:
  name: analytics-service
  namespace: rideflow
  labels:
    app: analytics-service
spec:
  replicas: 1                  # single instance — Redis is source of truth, no race on counters
  selector:
    matchLabels:
      app: analytics-service
  template:
    metadata:
      labels:
        app: analytics-service
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port:   "8000"
        prometheus.io/path:   "/metrics"
    spec:
      containers:
        - name: analytics-service
          image: rideflow/analytics-service:latest
          ports:
            - containerPort: 8000
          envFrom:
            - configMapRef:
                name: rideflow-config
          env:
            - name: SERVICE_NAME
              value: "analytics-service"
          resources:
            requests:
              cpu:    "100m"
              memory: "128Mi"
            limits:
              cpu:    "500m"
              memory: "256Mi"
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 20
            periodSeconds: 10