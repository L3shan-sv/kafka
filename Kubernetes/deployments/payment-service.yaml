apiVersion: apps/v1
kind: Deployment
metadata:
  name: payment-service
  namespace: rideflow
  labels:
    app: payment-service
spec:
  replicas: 2
  selector:
    matchLabels:
      app: payment-service
  template:
    metadata:
      labels:
        app: payment-service
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port:   "8000"
    spec:
      containers:
        - name: payment-service
          image: rideflow/payment-service:latest
          envFrom:
            - configMapRef:
                name: rideflow-config
          env:
            - name: SERVICE_NAME
              value: "payment-service"
          resources:
            requests:
              cpu:    "200m"
              memory: "256Mi"
            limits:
              cpu:    "1000m"
              memory: "512Mi"
          livenessProbe:
            exec:
              command: ["python", "-c", "import redis, os; redis.from_url(os.getenv('REDIS_URL')).ping()"]
            initialDelaySeconds: 15
            periodSeconds: 30