apiVersion: apps/v1
kind: Deployment
metadata:
  name: notification-service
  namespace: rideflow
  labels:
    app: notification-service
spec:
  replicas: 2
  selector:
    matchLabels:
      app: notification-service
  template:
    metadata:
      labels:
        app: notification-service
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port:   "8000"
    spec:
      containers:
        - name: notification-service
          image: rideflow/notification-service:latest
          envFrom:
            - configMapRef:
                name: rideflow-config
          env:
            - name: SERVICE_NAME
              value: "notification-service"
          resources:
            requests:
              cpu:    "100m"
              memory: "128Mi"
            limits:
              cpu:    "500m"
              memory: "256Mi"
          livenessProbe:
            exec:
              command: ["python", "-c", "import redis, os; redis.from_url(os.getenv('REDIS_URL')).ping()"]
            initialDelaySeconds: 15
            periodSeconds: 30

---