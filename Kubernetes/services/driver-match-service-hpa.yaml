apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: driver-match-service-hpa
  namespace: rideflow
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: driver-match-service
  minReplicas: 3
  maxReplicas: 12           # max 12 — matches 4 partitions × 3 consumer threads
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 60